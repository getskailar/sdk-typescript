name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3" # pinned to match the committed bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # npm performs the publish so provenance attestation is emitted and OIDC
      # Trusted Publishing is used (no NPM_TOKEN secret required).
      - name: Set up Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) requires npm >= 11.5.1, newer than the npm
      # bundled with Node 20.
      - name: Update npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
